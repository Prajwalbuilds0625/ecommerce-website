<!DOCTYPE html>
<html>
<head>

    <title>Cart - ColoShop</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">

    <style>

        body{
            background:#f5f5f5;
        }

        .cart-box{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
        }

        .cart-title{
            font-weight:bold;
            margin-bottom:20px;
        }

        .table img{
            width:70px;
            height:70px;
            object-fit:cover;
            border-radius:10px;
        }

        .total-box{
            background:#222;
            color:white;
            padding:15px;
            border-radius:10px;
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }

        .place-btn{
            width:100%;
            padding:12px;
            font-size:18px;
            font-weight:bold;
            border:none;
            border-radius:8px;
            background:#28a745;
            color:white;
            transition:0.3s;
        }

        .place-btn:hover{
            background:#218838;
        }

        #popup{
            display:none;
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            background:white;
            width:350px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            z-index:9999;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        #popup h3{
            color:green;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="cart-box">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="cart-title">🛒 Your Shopping Cart</h2>

            <a href="index.html" class="btn btn-dark">
                Continue Shopping
            </a>

        </div>

        <div class="table-responsive">

            <table class="table table-bordered align-middle">

                <thead class="table-dark">

                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th width="120">Action</th>
                    </tr>

                </thead>

                <tbody id="cartItems"></tbody>

            </table>

        </div>

        <!-- TOTAL -->
        <div class="total-box">
            Total Amount : $<span id="totalAmount">0</span>
        </div>

        <!-- ADDRESS -->
        <div class="mt-4">

            <label class="form-label fw-bold">
                Delivery Address
            </label>

            <textarea
                id="address"
                class="form-control"
                rows="4"
                placeholder="Enter full delivery address"
            ></textarea>

        </div>

        <!-- PLACE ORDER -->
        <button class="place-btn mt-4" onclick="placeOrder()">
            Place Order
        </button>

    </div>

</div>

<!-- SUCCESS POPUP -->
<div id="popup">

    <h3>🎉 Order Successful</h3>

    <p>Your order has been stored successfully.</p>

    <button class="btn btn-success mt-3" onclick="closePopup()">
        OK
    </button>

</div>

<script>

// LOAD CART
function loadCart(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let table = document.getElementById("cartItems");

    let total = 0;

    table.innerHTML = "";

    // EMPTY CART
    if(cart.length === 0){

        table.innerHTML = `
            <tr>
                <td colspan="3" class="text-center text-danger fw-bold">
                    Cart is Empty
                </td>
            </tr>
        `;

        document.getElementById("totalAmount").innerText = 0;

        return;
    }

    // SHOW ITEMS
    cart.forEach((item,index)=>{

        total += Number(item.price);

        table.innerHTML += `

            <tr>

                <td>
                    ${item.name}
                </td>

                <td>
                    $${item.price}
                </td>

                <td>

                    <button 
                        class="btn btn-danger btn-sm"
                        onclick="removeItem(${index})"
                    >
                        Remove
                    </button>

                </td>

            </tr>

        `;
    });

    document.getElementById("totalAmount").innerText = total;
}


// REMOVE ITEM
function removeItem(index){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index,1);

    localStorage.setItem("cart", JSON.stringify(cart));

    loadCart();
}


// PLACE ORDER
async function placeOrder(){

    let address = document.getElementById("address").value.trim();

    if(address === ""){

        alert("Please enter delivery address");

        return;
    }

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length === 0){

        alert("Cart is Empty");

        return;
    }

    let currentUser = localStorage.getItem("currentUser");

    if(!currentUser){

        alert("Please login first");

        window.location.href = "login.html";

        return;
    }

    try{

        for(let item of cart){

            await fetch("http://localhost:3000/order",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    product_name:item.name,

                    price:item.price,

                    user_email:currentUser

                })

            });

        }

        // SHOW POPUP
        document.getElementById("popup").style.display = "block";

        // CLEAR CART
        localStorage.removeItem("cart");

    }

    catch(error){

        console.log(error);

        alert("Server Error");

    }

}


// CLOSE POPUP
function closePopup(){

    document.getElementById("popup").style.display = "none";

    window.location.href = "index.html";
}


// PAGE LOAD
window.onload = loadCart;

</script>

</body>
</html>
