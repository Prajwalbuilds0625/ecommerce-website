<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login - ColoShop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#141e30,#243b55);

            font-family:Arial, Helvetica, sans-serif;
        }

        .admin-box{

            width:380px;

            background:white;

            border-radius:15px;

            overflow:hidden;

            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .top-section{

            background:#111827;

            color:white;

            text-align:center;

            padding:30px 20px;
        }

        .top-section img{

            width:90px;

            margin-top:10px;
        }

        .bottom-section{

            padding:30px;
        }

        .bottom-section h3{

            text-align:center;

            margin-bottom:25px;

            font-weight:bold;

            color:#333;
        }

        .form-control{

            height:45px;

            border-radius:8px;
        }

        .login-btn{

            width:100%;

            background:#111827;

            color:white;

            border:none;

            padding:12px;

            border-radius:8px;

            font-weight:bold;

            transition:0.3s;
        }

        .login-btn:hover{

            background:#2563eb;
        }

        #msg{

            margin-top:15px;

            text-align:center;

            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="admin-box">

    <!-- TOP -->
    <div class="top-section">

        <h2>COLOSHOP</h2>

        <img src="https://cdn-icons-png.flaticon.com/512/1041/1041884.png">

        <p class="mt-3">
            Admin Panel Login
        </p>

    </div>

    <!-- BOTTOM -->
    <div class="bottom-section">

        <h3>ADMIN LOGIN</h3>

        <form onsubmit="return adminLogin()">

            <input
                type="text"
                id="adminUser"
                class="form-control mb-3"
                placeholder="Enter Admin Username"
            >

            <input
                type="password"
                id="adminPass"
                class="form-control mb-3"
                placeholder="Enter Password"
            >

            <button class="login-btn">
                LOGIN
            </button>

        </form>

        <p id="msg"></p>

    </div>

</div>

<script>
function adminLogin() {

    let username = document.getElementById("adminUser").value;
    let password = document.getElementById("adminPass").value;

    if (username === "admin" && password === "admin123") {

        localStorage.setItem("admin", "true");

        alert("Login Successful");

        window.location.href = "admin-dashboard.html"; // redirect fix

    } else {
        alert("Invalid Credentials");
    }

    return false; // prevent form reload
}
</script>

</body>
</html>
