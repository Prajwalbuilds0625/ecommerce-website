<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ColoShop Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #3a7bd5, #00d2ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .card-box{
            width: 370px;
            border-radius: 15px;
            overflow: hidden;
        }

        .top-section{
            background: #5a8dee;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .top-section img{
            width: 120px;
        }

        .bottom-section{
            background: white;
            padding: 25px;
            text-align: center;
        }

        .btn-orange{
            background: orange;
            color: white;
            border: none;
        }

        .btn-orange:hover{
            background: darkorange;
            color: white;
        }

        #msg{
            font-weight: bold;
        }

        .admin-link{
            display: block;
            margin-top: 10px;
            text-decoration: none;
        }

    </style>

</head>

<body>

<div class="card shadow card-box">

    <!-- TOP -->
    <div class="top-section">

        <h3>COLOSHOP</h3>

        <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png">

        <p>Welcome To Shopping App</p>

    </div>

    <!-- BOTTOM -->
    <div class="bottom-section">

        <h4>USER LOGIN</h4>

        <p class="text-muted">Welcome Back</p>

        <form onsubmit="return loginUser()">

            <input
                type="text"
                id="user"
                class="form-control mb-3"
                placeholder="Enter Username"
            >

            <input
                type="password"
                id="pass"
                class="form-control mb-3"
                placeholder="Enter Password"
            >

            <button class="btn btn-orange w-100">
                LOGIN
            </button>

        </form>

        <p id="msg" class="mt-3"></p>

        <a href="signup.html">
            Create Account
        </a>

        <a href="admin-login.html" class="admin-link">
            Admin Login
        </a>

    </div>

</div>

<script>

async function loginUser(){

    var u = document.getElementById("user").value;
    var p = document.getElementById("pass").value;

    // VALIDATION
    if(u === "" || p === ""){

        document.getElementById("msg").innerHTML = "Please fill all fields";
        document.getElementById("msg").style.color = "red";

        return false;
    }

    try{

        const response = await fetch("http://localhost:3000/login", {

            method: "POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({

                username: u,
                password: p

            })

        });

        const data = await response.json();

        // SUCCESS
        if(data.message === "Login Successful"){

            localStorage.setItem("currentUser", u);

            localStorage.setItem("role", data.role);

            document.getElementById("msg").innerHTML = "Login Successful";
            document.getElementById("msg").style.color = "green";

            // ADMIN REDIRECT
            if(data.role === "admin"){

                window.location.href = "admin-dashboard.html";

            }

            // USER REDIRECT
            else{

                window.location.href = "index.html";
            }

        }

        // INVALID LOGIN
        else{

            document.getElementById("msg").innerHTML = data.message;
            document.getElementById("msg").style.color = "red";

        }

    }

    catch(error){

        document.getElementById("msg").innerHTML = "Server Error";
        document.getElementById("msg").style.color = "red";

    }

    return false;
}

</script>

</body>
</html>
