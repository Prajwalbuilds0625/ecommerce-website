<!DOCTYPE html>
<html>
<head>
    <title>ColoShop Signup</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            font-family:Arial, Helvetica, sans-serif;
        }

        .signup-box{
            width:380px;
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
        }

        .top-box{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:30px 20px;
        }

        .top-box img{
            width:90px;
            margin:15px 0;
        }

        .bottom-box{
            padding:30px;
        }

        .bottom-box h3{
            text-align:center;
            margin-bottom:20px;
            font-weight:bold;
        }

        .form-control{
            height:45px;
            border-radius:8px;
        }

        .signup-btn{
            width:100%;
            background:#ff6600;
            color:white;
            border:none;
            padding:12px;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        .signup-btn:hover{
            background:#e65c00;
        }

        #msg{
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

        .login-link a{
            text-decoration:none;
            font-weight:bold;
            color:#0d6efd;
        }

    </style>

</head>

<body>

<div class="signup-box">

    <!-- TOP -->
    <div class="top-box">

        <h2>COLOSHOP</h2>

        <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png">

        <p>Create your shopping account</p>

    </div>

    <!-- BOTTOM -->
    <div class="bottom-box">

        <h3>User Signup</h3>

        <form onsubmit="return signup()">

            <input 
                type="text"
                id="user"
                class="form-control mb-3"
                placeholder="Enter Username"
            >

            <input 
                type="password"
                id="pass"
                class="form-control mb-3"
                placeholder="Enter Password"
            >

            <button class="signup-btn">
                SIGNUP
            </button>

        </form>

        <p id="msg"></p>

        <div class="login-link">
            Already have account?
            <a href="login.html">Login</a>
        </div>

    </div>

</div>

<script>

async function signup(){

    let u = document.getElementById("user").value.trim();

    let p = document.getElementById("pass").value.trim();

    let msg = document.getElementById("msg");

    // VALIDATION
    if(u === "" || p === ""){

        msg.innerHTML = "Please fill all fields";
        msg.style.color = "red";

        return false;
    }

    if(p.length < 4){

        msg.innerHTML = "Password must be at least 4 characters";
        msg.style.color = "red";

        return false;
    }

    try{

        const response = await fetch("http://localhost:3000/signup",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                username:u,
                password:p
            })

        });

        const data = await response.json();

        msg.innerHTML = data.message;

        if(data.message === "Signup Successful"){

            msg.style.color = "green";

            alert("Account Created Successfully");

            setTimeout(() => {

                window.location.href = "login.html";

            },1000);

        }

        else{

            msg.style.color = "red";
        }

    }

    catch(error){

        msg.innerHTML = "Server Error";
        msg.style.color = "red";

        console.log(error);
    }

    return false;
}

</script>

</body>
</html>
